<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Offline · H!Outz</title>
  <link rel="icon" href="/favicon.png" />
  <style>
    :root {
      --bg: #0F172A;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #0D9488;
      --accent: #F97316;
      --text: #F1F5F9;
      --muted: #94A3B8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(120% 120% at 50% 0%, #12233f 0%, var(--bg) 60%);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .wrap {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 28px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .logo {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
    }
    .logo span { color: var(--primary); }
    .logo .star { color: var(--accent); }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(13, 148, 136, 0.12);
      border: 1px solid rgba(13, 148, 136, 0.3);
    }
    .icon svg { width: 34px; height: 34px; stroke: var(--primary); }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 14px; line-height: 1.55; color: var(--muted); margin-bottom: 8px; }
    .sub { font-size: 12px; color: var(--muted); opacity: 0.8; margin-top: 4px; }
    button {
      margin-top: 26px;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }
    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }
    .status {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .dot.online { background: #22c55e; }
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <div class="logo">H<span>!</span><span class="star">✦</span>utz</div>
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8.82a15 15 0 0 1 20 0" />
        <path d="M5 12.859a10 10 0 0 1 14 0" />
        <path d="M8.5 16.429a5 5 0 0 1 7 0" />
        <line x1="1" y1="1" x2="23" y2="23" />
      </svg>
    </div>
    <h1 lang="de">Du bist offline</h1>
    <p lang="de">Es besteht gerade keine Internetverbindung. Sobald du wieder online bist, kannst du H!Outz normal weiter nutzen.</p>
    <p class="sub" lang="en">You're offline. Check your connection and try again.</p>
    <button type="button" onclick="location.reload()">Erneut versuchen</button>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">Verbindung wird geprüft…</span>
    </div>
  </main>
  <script>
    (function () {
      var dot = document.getElementById('dot');
      var text = document.getElementById('statusText');
      function update() {
        if (navigator.onLine) {
          dot.classList.add('online');
          text.textContent = 'Wieder online – lädt neu…';
          setTimeout(function () { location.reload(); }, 600);
        } else {
          dot.classList.remove('online');
          text.textContent = 'Keine Verbindung';
        }
      }
      window.addEventListener('online', update);
      window.addEventListener('offline', update);
      update();
    })();
  </script>
</body>
</html>
