    <link rel="canonical" href="https://vybepulse.app/" />
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <meta name="theme-color" content="#6366F1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VybePulse" />
    
    <!-- Google Fonts – preconnect + swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Open Graph -->
    <meta property="og:title" content="VybePulse – KI-gestützte Date-Planung" />
    <meta property="og:description" content="Personalisierte Venue-Empfehlungen für euer perfektes Date – powered by AI." />

    <meta property="og:url" content="https://vybepulse.app/" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:site_name" content="VybePulse" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VybePulse – KI-gestützte Date-Planung" />
    <meta name="twitter:description" content="Personalisierte Venue-Empfehlungen für euer perfektes Date – powered by AI." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "VybePulse",
      "description": "KI-gestützte Date-Planning-Plattform mit personalisierten Venue-Empfehlungen",
      "url": "https://vybepulse.app",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web",
      "inLanguage": "de",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      }
    }
    </script>
  </head>

  <body>
    <!-- Skip navigation link for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[9999] focus:bg-primary focus:text-primary-foreground focus:px-4 focus:py-2 focus:rounded-lg focus:text-sm focus:font-medium">
      Zum Inhalt springen
    </a>
    <div id="root"></div>
    <div id="app-loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1a1b2e;color:#e2e8f0;font-family:Inter,system-ui,sans-serif;">
      <div style="text-align:center;">
        <div style="width:40px;height:40px;border:3px solid rgba(99,102,241,0.3);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
        <p style="font-size:14px;opacity:0.7;">Wird geladen…</p>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      // Remove loading screen once React mounts
      const _ro = new MutationObserver(function(m){
        if(document.getElementById('root') && document.getElementById('root').children.length > 0){
          var el = document.getElementById('app-loading');
          if(el) el.remove();
          _ro.disconnect();
          clearTimeout(window.__loadTimeout);
        }
      });
      _ro.observe(document.getElementById('root'), {childList: true});
      // If React hasn't mounted after 12s, show reload button
      window.__loadTimeout = setTimeout(function(){
        var el = document.getElementById('app-loading');
        if(el && document.getElementById('root') && document.getElementById('root').children.length === 0){
          el.innerHTML = '<div style="text-align:center;"><div style="width:40px;height:40px;border:3px solid rgba(99,102,241,0.3);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div><p style="font-size:14px;opacity:0.7;margin-bottom:16px;">Laden dauert länger als erwartet…</p><button onclick="location.reload()" style="padding:8px 24px;background:#6366f1;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Neu laden</button></div>';
        }
      }, 12000);
    </script>
    <noscript>
      <div style="text-align:center;padding:2rem;font-family:sans-serif;">
        <h1>VybePulse</h1>
        <p>Diese App benötigt JavaScript. Bitte aktiviere JavaScript in deinem Browser.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service worker registration is handled by the React app.
      // Skipped here to avoid errors in preview environments.
    </script>
  </body>
</html>
